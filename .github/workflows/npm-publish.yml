name: Nightly npm publish

on:
  schedule:
    - cron: "0 2 * * *" # 02:00 UTC every night
  workflow_dispatch: # manual trigger always proceeds to publish

permissions:
  contents: write # needed to push sync commits
  id-token: write # needed for npm provenance (OIDC)

jobs:
  sync-and-publish:
    name: Sync upstream → build → publish
    runs-on: ubuntu-latest

    steps:
      - name: Check out fork
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Add upstream remote
        run: |
          git remote add upstream https://github.com/apache/guacamole-client.git
          git fetch upstream

      - name: Merge upstream main into fork
        id: sync
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          BEFORE=$(git rev-parse HEAD)
          git merge --no-edit upstream/main || {
            echo "Merge conflict — aborting sync"
            git merge --abort
            echo "changed=false" >> "$GITHUB_OUTPUT"
            # On manual trigger, still proceed even if nothing merged
            exit 0
          }
          AFTER=$(git rev-parse HEAD)

          if [ "$BEFORE" != "$AFTER" ]; then
            git push origin main
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No upstream changes."
          fi

      # Proceed if upstream changed, OR if this was triggered manually
      - name: Decide whether to publish
        id: gate
        run: |
          MANUAL="${{ github.event_name == 'workflow_dispatch' }}"
          CHANGED="${{ steps.sync.outputs.changed }}"
          if [ "$MANUAL" = "true" ] || [ "$CHANGED" = "true" ]; then
            echo "publish=true" >> "$GITHUB_OUTPUT"
          else
            echo "publish=false" >> "$GITHUB_OUTPUT"
            echo "No upstream changes and not a manual run — skipping publish."
          fi

      - name: Read current package version
        if: steps.gate.outputs.publish == 'true'
        id: version
        run: |
          VERSION=$(grep -m1 '"version"' guacamole-common-js-npm/package.json | sed 's/.*"\([0-9.]*\)".*/\1/')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Check if this version is already published
        if: steps.gate.outputs.publish == 'true'
        id: check_npm
        run: |
          PUBLISHED=$(npm view guacamole-js-sdk@${{ steps.version.outputs.version }} version 2>/dev/null || echo "")
          if [ -n "$PUBLISHED" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Version ${{ steps.version.outputs.version }} already on npm — skipping publish."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build Docker image
        if: steps.gate.outputs.publish == 'true' && steps.check_npm.outputs.skip == 'false'
        run: docker build --pull --no-cache --force-rm -t guacamole-build:local .

      - name: Extract JS bundle from built image
        if: steps.gate.outputs.publish == 'true' && steps.check_npm.outputs.skip == 'false'
        run: |
          cid=$(docker create guacamole-build:local)
          docker cp "$cid:/opt/guacamole/webapp/guacamole.war" guacamole.war
          docker rm "$cid"

          mkdir -p guacamole-common-js-npm/dist
          unzip -q guacamole.war -d war-contents
          cp war-contents/guacamole-common-js/all.js     guacamole-common-js-npm/dist/all.js
          cp war-contents/guacamole-common-js/all.min.js guacamole-common-js-npm/dist/all.min.js

      - name: Set up Node.js
        if: steps.gate.outputs.publish == 'true' && steps.check_npm.outputs.skip == 'false'
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
          package-manager-cache: false

      - name: Publish to npm with provenance
        if: steps.gate.outputs.publish == 'true' && steps.check_npm.outputs.skip == 'false'
        working-directory: guacamole-common-js-npm
        run: npm publish --provenance --access public
